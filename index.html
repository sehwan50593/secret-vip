<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret VIP 프로모션 안내</title>
    <style>
        /* 기존 스타일 유지 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #334155; line-height: 1.7; padding: 20px 15px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #ffffff; padding: 30px 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); margin: 20px 0; }
        .header-title { font-size: 24px; font-weight: 800; color: #0f172a; text-align: center; margin-bottom: 25px; }
        
        /* 강조 스타일 추가 */
        .urgent-highlight {
            background-color: #fee2e2;
            border: 2px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .urgent-text {
            color: #b91c1c;
            font-weight: 800;
            font-size: 16px;
        }

        /* 복사 버튼 스타일 */
        .code-container { background-color: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 8px; text-align: center; margin: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .code-highlight { font-family: Consolas, monospace; font-size: 24px; font-weight: 700; color: #dc2626; }
        .copy-btn { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .copy-btn:hover { background: #1e293b; }
        
        .link-button { display: inline-block; background-color: #2563eb; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 700; text-align: center; width: 100%; }
        .section { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .section-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-title">Secret VIP 프로모션 안내</h1>

    <!-- 강조 박스 추가 -->
    <div class="urgent-highlight">
        <p class="urgent-text">⚠️ 필독: 추천인 코드 필수 입력</p>
        <p style="font-size: 14px; margin-top: 5px;">코드 미입력 시 할인 혜택이 적용되지 않습니다.</p>
    </div>

    <div class="section">
        <h2 class="section-title">🎫 추천인코드 복사 및 입력</h2>
        <p style="font-size: 14.5px;">아래 버튼을 눌러 코드를 복사한 뒤 결제창에 입력하세요.</p>
        <div class="code-container">
            <span class="code-highlight" id="referralCode">qwer22</span>
            <button class="copy-btn" onclick="copyCode()">코드 복사하기</button>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">🔗 가입 / 결제 링크</h2>
        <a href="https://theplanx.imweb.me/Secret-VIP" class="link-button" target="_blank">Secret VIP 가입/결제하러 가기</a>
    </div>
</div>

<script>
    function copyCode() {
        const code = document.getElementById("referralCode").innerText;
        navigator.clipboard.writeText(code).then(() => {
            alert("추천인 코드가 복사되었습니다: " + code);
        });
    }
</script>

</body>
</html>
